<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <section class="contact-section">
    <div class="contact">
      <main class="contact-main">
        <section class="cont-L">
          <h2 class="title">Contact us<span class="underline"></span></h2>
          <p class="desc">
            If you have questions please<br>
            do not hesitate to contact us<br>
            during working hours<br>
            from 8 am till 4 pm
          </p>

          <div class="info">
            <div class="info-row">
              <i class="fa-solid fa-phone"></i>
              <span>(079) 555-0103</span>
            </div>

            <div class="info-row">
              <i class="fa-solid fa-envelope"></i>
              <span>Information@ca.com</span>
            </div>

            <div class="info-row">
              <i class="fa-solid fa-location-dot"></i>
              <span>Main St, building 10</span>
            </div>
          </div>

          <div class="map">
            <img src="images/map.png" alt="Map"/></div>
        </section>
        <section class="cont-R">
          <h2 class="title">Send us a Message<span class="underline"></span></h2>
          <form class="form" action="#" method="post">
            <input type="text" placeholder="Name" />
            <input type="text" placeholder="Subject" />
            <input type="email" placeholder="Email" />
            <textarea rows="6" placeholder="Message"></textarea>
            <button type="submit" class="btn">Submit</button>
          </form>
        </section>
      </main>
    </div>
  </section>
</body>
</html>
